<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum Tracker</title>
<style>
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e2d45;--accent:#f97316;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#f1f5f9;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:16px;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;font-size:1.4rem;font-weight:700;}
.logo span{color:var(--accent);}
.status-bar{display:flex;align-items:center;gap:16px;font-size:0.8rem;color:var(--muted);}
.live-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;display:inline-block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.refresh-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;}
.config-bar{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.config-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:0.78rem;flex:1;min-width:200px;font-family:monospace;}
.save-btn{background:var(--accent);border:none;color:white;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:0.78rem;font-weight:600;}
.main-layout{display:flex;gap:20px;align-items:flex-start;}
.games-col{width:310px;flex-shrink:0;}
.dash-col{flex:1;min-width:0;}
.section-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
.games-list{display:flex;flex-direction:column;gap:8px;}
.game-card{border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color 0.2s;border:1px solid var(--border);background:var(--card);}
.game-card:hover,.game-card.active{border-color:var(--accent);}
.game-card.is-upcoming{border-style:dashed;opacity:0.85;}
.game-card.is-final{opacity:0.65;}
.game-card.card-upset{background:#0b2218;border-color:#22c55e !important;}
.game-card.card-underdog{background:#211c00;border-color:#eab308 !important;}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.status-pill{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.sp-live{background:rgba(34,197,94,0.15);color:var(--green);}
.sp-halftime{background:rgba(234,179,8,0.15);color:var(--yellow);}
.sp-final{background:rgba(100,116,139,0.15);color:var(--muted);}
.sp-upcoming{background:rgba(59,130,246,0.15);color:var(--accent2);}
.card-clock{font-size:1rem;font-weight:900;color:#fff;}
.card-clock.halftime{color:var(--yellow);}
.card-clock.final{color:var(--muted);font-size:0.75rem;font-weight:400;}
.card-clock.upcoming{color:var(--accent2);font-size:0.72rem;font-weight:600;}
.tourn-banner{font-size:0.62rem;font-weight:600;color:var(--accent);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.team-row{display:flex;align-items:center;gap:5px;padding:4px 0;}
.team-row+.team-row{border-top:1px solid rgba(30,45,69,0.7);}
.t-badge{min-width:22px;text-align:center;flex-shrink:0;font-size:0.72rem;}
.t-badge.rank-b{font-weight:900;color:#fff;}
.t-badge.seed-b{font-weight:400;color:#fff;}
.t-info{flex:1;min-width:0;}
.t-nameline{display:flex;align-items:center;gap:4px;}
.t-name{font-size:0.73rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-fav{font-size:0.75rem;flex-shrink:0;}
.t-rec{font-size:0.6rem;color:var(--muted);margin-top:1px;}
.t-score{font-size:1.25rem;font-weight:900;min-width:34px;text-align:right;flex-shrink:0;}
.s-win{color:var(--green);}
.s-tie{color:var(--accent2);}
.s-lose{color:var(--text);}
.card-footer{margin-top:7px;padding-top:6px;border-top:1px solid rgba(30,45,69,0.7);font-size:0.62rem;}
.game-location{color:var(--muted);margin-bottom:3px;}
.card-alerts{display:flex;flex-wrap:wrap;gap:4px;justify-content:space-between;align-items:center;margin-top:2px;}
.line-str{color:var(--accent);font-weight:700;}
.close-alert{color:var(--red);font-weight:700;animation:flash 0.7s infinite;}
.upset-str{color:var(--green);font-weight:700;}
.udog-str{color:var(--yellow);font-weight:700;}
@keyframes flash{0%,100%{opacity:1}50%{opacity:0.15}}
.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.card-title{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.badge{font-size:0.65rem;padding:2px 8px;border-radius:20px;font-weight:600;}
.badge-live{background:rgba(34,197,94,0.15);color:var(--green);}
.badge-foul{background:rgba(239,68,68,0.15);color:var(--red);}
.scoreboard-card,.scoring-chart-card,.eff-chart-card,.players-card-full{grid-column:1/-1;}
.scoreboard-inner{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center;}
.team-block{text-align:center;}
.team-name-lg{font-size:1.1rem;font-weight:800;margin-bottom:4px;}
.team-record{font-size:0.7rem;color:var(--muted);margin-bottom:8px;}
.team-rank{display:inline-block;background:var(--accent);color:white;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:8px;}
.big-score{font-size:3.5rem;font-weight:900;line-height:1;}
.home-ind{font-size:0.65rem;color:var(--accent2);font-weight:600;margin-top:4px;}
.clock-block{text-align:center;}
.clock{font-size:1.8rem;font-weight:800;color:var(--accent);}
.period{font-size:0.7rem;color:var(--muted);margin-top:4px;font-weight:600;text-transform:uppercase;}
.timeouts-row{display:flex;justify-content:center;gap:4px;margin-top:6px;}
.timeout-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);}
.timeout-dot.used{background:var(--border);}
/* Scoring chart */
.chart-wrap{position:relative;width:100%;}
.chart-legend{display:flex;gap:20px;margin-bottom:8px;font-size:0.7rem;}
.legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle;}
/* Efficiency panels */
.eff-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.eff-team{background:var(--card2);border-radius:10px;padding:14px;border:1px solid var(--border);}
.eff-team-name{font-size:0.75rem;font-weight:700;margin-bottom:12px;color:var(--text);}
.eff-row{margin-bottom:10px;}
.eff-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;display:flex;justify-content:space-between;margin-bottom:4px;}
.eff-val{font-size:0.85rem;font-weight:800;}
.eff-bar-bg{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;}
.eff-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.eff-bar-off{background:var(--accent);}
.eff-bar-def{background:var(--accent2);}
.eff-bar-ts{background:var(--green);}
.eff-bar-tov{background:var(--red);}
.eff-bar-reb{background:var(--yellow);}
/* Players */
.players-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.players-table th{text-align:center;font-size:0.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;padding:0 4px 8px;border-bottom:1px solid var(--border);}
.players-table th:first-child{text-align:left;}
.players-table td{padding:7px 4px;border-bottom:1px solid rgba(30,45,69,0.5);text-align:center;}
.players-table td:first-child{text-align:left;}
.players-table tr:last-child td{border-bottom:none;}
.player-name{font-weight:600;}
.player-pos{font-size:0.65rem;color:var(--muted);}
.foul-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.7rem;font-weight:700;}
.foul-danger{background:rgba(239,68,68,0.2);color:var(--red);}
.foul-warning{background:rgba(234,179,8,0.2);color:var(--yellow);}
.foul-ok{background:rgba(34,197,94,0.1);color:var(--green);}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-block{background:var(--card2);border-radius:8px;padding:10px 12px;}
.info-label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.info-value{font-size:0.95rem;font-weight:700;}
.h2h-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(30,45,69,0.5);font-size:0.78rem;}
.h2h-row:last-child{border-bottom:none;}
.loading{display:flex;align-items:center;justify-content:center;height:60px;color:var(--muted);font-size:0.8rem;gap:8px;}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:10px 14px;font-size:0.78rem;color:var(--red);margin-bottom:14px;}
.no-game{grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);font-size:0.85rem;}
</style>
</head>
<body>
<header>
  <div class="logo">🏀 <span>Momentum</span> Tracker</div>
  <div class="status-bar">
    <span><span class="live-dot"></span> Live</span>
    <span id="lastUpdate">—</span>
    <button class="refresh-btn" onclick="refreshAll()">↻ Refresh</button>
  </div>
</header>
<div class="config-bar">
  <span style="font-size:0.75rem;color:var(--muted)">RapidAPI Key:</span>
  <input type="password" class="config-input" id="apiKeyInput" placeholder="Paste your RapidAPI key here..."/>
  <button class="save-btn" onclick="saveApiKey()">Save & Load</button>
</div>
<div id="errorBox" style="display:none" class="error-msg"></div>
<div class="main-layout">
  <div class="games-col">
    <div class="section-title">Today's Games</div>
    <div class="games-list" id="gamesList">
      <div class="loading"><div class="spinner"></div> Enter API key above...</div>
    </div>
  </div>
  <div class="dash-col">
    <div class="dashboard" id="mainDashboard">
      <div class="no-game">👈 Select a game to load the dashboard</div>
    </div>
  </div>
</div>
<script>
const HOST='sports-information.p.rapidapi.com';
let KEY=localStorage.getItem('mt_key')||'';
let selGameId=null,autoTimer=null,selEvt=null;
window.addEventListener('load',()=>{if(KEY){document.getElementById('apiKeyInput').value=KEY;loadGames();}});
function saveApiKey(){KEY=document.getElementById('apiKeyInput').value.trim();localStorage.setItem('mt_key',KEY);loadGames();}
function refreshAll(){loadGames();if(selGameId)loadGameDetails(selGameId);}
function showErr(m){const b=document.getElementById('errorBox');b.style.display='block';b.textContent='⚠️ '+m;setTimeout(()=>b.style.display='none',8000);}
async function api(path){const r=await fetch('https://'+HOST+path,{headers:{'x-rapidapi-host':HOST,'x-rapidapi-key':KEY}});if(!r.ok)throw new Error('API '+r.status);return r.json();}
function getRec(team,type){return team?.records?.find(r=>r.type===type)?.summary||'';}
function winPct(rec){if(!rec)return 0.5;const p=rec.split('-');const w=parseInt(p[0])||0,l=parseInt(p[1])||0;return(w+l)===0?0.5:w/(w+l);}
function getFav(away,home,comp){
  const odds=comp?.odds?.[0];
  if(odds){
    if(odds.awayTeamOdds?.favorite===true)return'away';
    if(odds.homeTeamOdds?.favorite===true)return'home';
    const sp=parseFloat(odds.spread);
    if(!isNaN(sp))return sp<0?'home':'away';
  }
  return winPct(getRec(away,'total'))>winPct(getRec(home,'total'))?'away':'home';
}
function estimateLine(away,home){
  const ap=winPct(getRec(away,'total')),hp=winPct(getRec(home,'total'));
  const diff=(hp-ap)*100;if(Math.abs(diff)<2)return null;
  const spread=Math.min(Math.abs(diff)*0.4,28).toFixed(1);
  const fT=diff>0?home:away,dT=diff>0?away:home;
  return (fT.team?.abbreviation||'?')+' -'+spread+' / '+(dT.team?.abbreviation||'?')+' +'+spread;
}
function getStatus(evt){
  const desc=(evt.status?.type?.description||'').toLowerCase(),state=(evt.status?.type?.state||'').toLowerCase();
  const name=(evt.status?.type?.name||'').toLowerCase(),det=(evt.status?.type?.shortDetail||'').toLowerCase();
  if(name==='status_final'||desc.includes('final')||state==='post')return'final';
  if(desc.includes('half')||det.includes('half')||name.includes('halftime'))return'halftime';
  if(state==='in'||desc.includes('progress'))return'live';
  return'upcoming';
}
function sortOrd(t){return{live:0,halftime:1,final:2,upcoming:3}[t]??4;}
function clockSecs(s){if(!s)return 999;const p=s.split(':');return(parseInt(p[0])||0)*60+(parseInt(p[1])||0);}

async function loadGames(){
  if(!KEY){showErr('Enter your API key.');return;}
  const el=document.getElementById('gamesList');
  el.innerHTML='<div class="loading"><div class="spinner"></div> Loading...</div>';
  try{
    const t=new Date(),y=t.getFullYear(),m=String(t.getMonth()+1).padStart(2,'0'),d=String(t.getDate()).padStart(2,'0');
    const base='/mbb/scoreboard?year='+y+'&month='+m+'&day='+d;
    const [r1,r2,r3]=await Promise.allSettled([api(base+'&seasontype=2'),api(base+'&seasontype=3'),api(base+'&seasontype=4')]);
    const e1=r1.status==='fulfilled'?r1.value?.events||[]:[];
    const e2=r2.status==='fulfilled'?r2.value?.events||[]:[];
    const e3=r3.status==='fulfilled'?r3.value?.events||[]:[];
    e1.forEach(e=>e._stype=2);e2.forEach(e=>e._stype=3);e3.forEach(e=>e._stype=4);
    const ids1=new Set(e1.map(e=>e.id));
    const ids12=new Set([...ids1,...e2.map(e=>e.id)]);
    renderList({events:[...e1,...e2.filter(e=>!ids1.has(e.id)),...e3.filter(e=>!ids12.has(e.id))]});
  }catch(e){
    document.getElementById('gamesList').innerHTML='<div style="color:var(--red);padding:8px">Error: '+e.message+'</div>';
    showErr('Failed: '+e.message);
  }
}

function renderList(data){
  const el=document.getElementById('gamesList');el.innerHTML='';
  const evts=data?.events||[];
  if(!evts.length){el.innerHTML='<div style="color:var(--muted);padding:8px">No games today.</div>';return;}
  [...evts].sort((a,b)=>sortOrd(getStatus(a))-sortOrd(getStatus(b))).forEach(evt=>el.appendChild(buildCard(evt)));
}

function buildCard(evt){
  const comp=evt.competitions?.[0]||evt,teams=comp.competitors||[];
  const away=teams.find(t=>t.homeAway==='away')||teams[0]||{};
  const home=teams.find(t=>t.homeAway==='home')||teams[1]||{};
  const gid=evt.id||evt.gameId;
  const st=getStatus(evt);
  const neutral=!!(comp.neutralSite);
  const stype=evt._stype||2;
  const aScore=parseInt(away.score??-1),hScore=parseInt(home.score??-1);
  const hasScores=(aScore>=0&&hScore>=0)&&(aScore>0||hScore>0||st==='final');
  const isTie=hasScores&&aScore===hScore;
  const fav=getFav(away,home,comp);
  const udogWin=hasScores&&((fav==='home'&&aScore>hScore)||(fav==='away'&&hScore>aScore));
  const det=(evt.status?.type?.shortDetail||'').toLowerCase();
  const in2nd=det.includes('2nd')||det.includes('ot');
  const isUpset=(st==='halftime'||(st==='live'&&in2nd)||(st==='final'&&udogWin))&&udogWin;
  const isUdog=st==='live'&&!in2nd&&udogWin;
  const secs=clockSecs(evt.status?.displayClock);
  const isClose=hasScores&&in2nd&&secs<=300&&Math.abs(aScore-hScore)<8&&st==='live';
  const awayTotal=getRec(away,'total'),homeTotal=getRec(home,'total');
  const awayConf=getRec(away,'vsconf'),homeConf=getRec(home,'vsconf');
  let lineStr='';
  const apiOdds=comp?.odds?.[0];
  if(apiOdds?.details)lineStr=apiOdds.details+(apiOdds.overUnder?' · O/U '+apiOdds.overUnder:'');
  else lineStr=estimateLine(away,home)||'';
  const city=comp?.venue?.address?.city,state=comp?.venue?.address?.state;
  const locationStr=(city&&state)?city+', '+state:(city||'');
  const tournNote=comp?.notes?.[0]?.headline||'';
  const aCls=isTie?'s-tie':(aScore>hScore?'s-win':'s-lose');
  const hCls=isTie?'s-tie':(hScore>aScore?'s-win':'s-lose');
  function leftBadge(team){
    if((stype===3||stype===4)&&team.seed)return'<span class="t-badge seed-b">'+team.seed+'</span>';
    const rk=team.curatedRank?.current;
    if(stype===2&&rk&&rk<26)return'<span class="t-badge rank-b">'+rk+'</span>';
    return'<span class="t-badge"></span>';
  }
  const aFav=fav==='away',hFav=fav==='home';
  const aIcons=aFav?'<span class="t-fav"> ⭐</span>':'';
  const hIcons=(neutral?'':(hFav?'<span class="t-fav"> 🏠⭐</span>':'<span class="t-fav"> 🏠</span>'))+(neutral&&hFav?'<span class="t-fav"> ⭐</span>':'');
  let clockHtml='';
  if(st==='live'){const clk=evt.status?.displayClock||'';const per=evt.status?.period||1;const pl=per===1?'1ST':per===2?'2ND':'OT'+(per-2);clockHtml='<span class="card-clock">'+clk+' '+pl+'</span>';}
  else if(st==='halftime')clockHtml='<span class="card-clock halftime">HALFTIME</span>';
  else if(st==='final')clockHtml='<span class="card-clock final">FINAL</span>';
  else clockHtml='<span class="card-clock upcoming">'+(evt.status?.type?.shortDetail||'')+'</span>';
  const aName=away.team?.location||away.team?.displayName||'Away';
  const hName=home.team?.location||home.team?.displayName||'Home';
  const c=document.createElement('div');
  c.className='game-card is-'+st+(isUpset?' card-upset':isUdog?' card-underdog':'');
  c.onclick=()=>selectGame(gid,evt,c);
  c.innerHTML=
    '<div class="card-top"><span class="status-pill sp-'+st+'">'+{live:'● LIVE',halftime:'⏸ HLF',final:'FINAL',upcoming:'UPCOMING'}[st]+'</span>'+clockHtml+'</div>'+
    (tournNote?'<div class="tourn-banner">🏆 '+tournNote+'</div>':'')+
    '<div class="team-row">'+leftBadge(away)+'<div class="t-info"><div class="t-nameline"><span class="t-name">'+aName+'</span>'+aIcons+'</div><div class="t-rec">'+(awayTotal+(awayConf?' ('+awayConf+')':''))+'</div></div><span class="t-score '+aCls+'">'+(hasScores?aScore:'—')+'</span></div>'+
    '<div class="team-row">'+leftBadge(home)+'<div class="t-info"><div class="t-nameline"><span class="t-name">'+hName+'</span>'+hIcons+'</div><div class="t-rec">'+(homeTotal+(homeConf?' ('+homeConf+')':''))+'</div></div><span class="t-score '+hCls+'">'+(hasScores?hScore:'—')+'</span></div>'+
    '<div class="card-footer">'+(locationStr?'<div class="game-location">📍 '+locationStr+'</div>':'')+
    '<div class="card-alerts">'+(lineStr?'<span class="line-str">'+lineStr+'</span>':'<span></span>')+
    '<span>'+(isClose?'<span class="close-alert">🔥 Close!</span>':'')+(isUpset?' <span class="upset-str">🚨 Upset alert!</span>':'')+(isUdog?' <span class="udog-str">🔥 Underdog moving!</span>':'')+'</span></div></div>';
  return c;
}

async function selectGame(gid,evt,card){
  document.querySelectorAll('.game-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  selGameId=gid;selEvt=evt;renderDash(evt);await loadGameDetails(gid);
  if(autoTimer)clearInterval(autoTimer);
  autoTimer=setInterval(()=>{loadGames();if(selGameId)loadGameDetails(selGameId);},5000);
}

function renderDash(evt){
  const comp=evt.competitions?.[0]||evt,teams=comp.competitors||[];
  const away=teams.find(t=>t.homeAway==='away')||teams[0]||{};
  const home=teams.find(t=>t.homeAway==='home')||teams[1]||{};
  const clock=evt.status?.displayClock||'--:--',period=evt.status?.period||1;
  const pLabel=period===1?'1st Half':period===2?'2nd Half':'OT'+(period-2);
  const aName=away.team?.location||away.team?.displayName||'Away';
  const hName=home.team?.location||home.team?.displayName||'Home';
  const aAbbr=away.team?.abbreviation||'AWY';
  const hAbbr=home.team?.abbreviation||'HME';
  const neutral=!!(comp.neutralSite);
  document.getElementById('mainDashboard').innerHTML=
    '<div class="card scoreboard-card"><div class="card-header"><span class="card-title">Scoreboard</span><span class="badge badge-live">● Live</span></div>'+
    '<div class="scoreboard-inner">'+
      '<div class="team-block">'+(away.curatedRank?.current&&away.curatedRank.current<99?'<div class="team-rank">#'+away.curatedRank.current+'</div>':'')+
        '<div class="team-name-lg">'+aName+'</div><div class="team-record">'+getRec(away,'total')+'</div>'+
        '<div class="big-score" style="color:var(--accent2)">'+(away.score??'—')+'</div></div>'+
      '<div class="clock-block"><div class="clock">'+clock+'</div><div class="period">'+pLabel+'</div>'+
        '<div style="margin-top:12px;text-align:center"><div style="font-size:0.6rem;color:var(--muted);margin-bottom:4px">Timeouts</div>'+
        '<div style="display:flex;gap:20px;justify-content:center">'+
          '<div><div style="font-size:0.6rem;color:var(--muted);margin-bottom:3px">'+aAbbr+'</div><div class="timeouts-row" id="awayTO"></div></div>'+
          '<div><div style="font-size:0.6rem;color:var(--muted);margin-bottom:3px">'+hAbbr+'</div><div class="timeouts-row" id="homeTO"></div></div>'+
        '</div></div></div>'+
      '<div class="team-block">'+(home.curatedRank?.current&&home.curatedRank.current<99?'<div class="team-rank">#'+home.curatedRank.current+'</div>':'')+
        '<div class="team-name-lg">'+hName+'</div><div class="team-record">'+getRec(home,'total')+'</div>'+
        '<div class="big-score" style="color:var(--accent)">'+(home.score??'—')+'</div>'+
        (neutral?'':'<div class="home-ind">🏠 Home Court</div>')+
      '</div>'+
    '</div></div>'+
    // Scoring chart - full width
    '<div class="card scoring-chart-card">'+
      '<div class="card-header"><span class="card-title">📈 Scoring Chart</span>'+
        '<div class="chart-legend">'+
          '<span><span class="legend-dot" style="background:var(--accent2);display:inline-block"></span>'+aAbbr+'</span>'+
          '<span><span class="legend-dot" style="background:var(--accent);display:inline-block"></span>'+hAbbr+'</span>'+
        '</div>'+
      '</div>'+
      '<canvas id="scoringChart" style="width:100%;height:120px;display:block"></canvas>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.6rem;color:var(--muted);margin-top:4px;padding:0 4px">'+
        '<span>Start</span><span>Halftime</span><span>Now</span>'+
      '</div>'+
    '</div>'+
    // Efficiency charts
    '<div class="card eff-chart-card">'+
      '<div class="card-header"><span class="card-title">⚡ Efficiency Breakdown</span><span style="font-size:0.62rem;color:var(--muted)">Per 100 possessions</span></div>'+
      '<div class="eff-grid" id="effGrid"><div class="loading"><div class="spinner"></div></div></div>'+
    '</div>'+
    // Players - two side by side
    '<div class="card"><div class="card-header"><span class="card-title">📊 '+aName+'</span><span class="badge badge-foul">Foul Watch</span></div><div id="awayPlayers"><div class="loading"><div class="spinner"></div></div></div></div>'+
    '<div class="card"><div class="card-header"><span class="card-title">📊 '+hName+'</span><span class="badge badge-foul">Foul Watch</span></div><div id="homePlayers"><div class="loading"><div class="spinner"></div></div></div></div>'+
    '<div class="card"><div class="card-header"><span class="card-title">🎯 Game Info & Lines</span></div>'+
      '<div class="info-grid">'+
        '<div class="info-block"><div class="info-label">Venue</div><div class="info-value" style="font-size:0.8rem">'+(comp.venue?.fullName||'—')+'</div></div>'+
        '<div class="info-block"><div class="info-label">Attendance</div><div class="info-value">'+(comp.attendance?comp.attendance.toLocaleString():'—')+'</div></div>'+
        '<div class="info-block"><div class="info-label">Spread</div><div class="info-value" id="spreadVal">—</div></div>'+
        '<div class="info-block"><div class="info-label">Over/Under</div><div class="info-value" id="ouVal">—</div></div>'+
      '</div></div>'+
    '<div class="card"><div class="card-header"><span class="card-title">📋 Head to Head</span></div><div id="h2hSection"><div class="loading"><div class="spinner"></div></div></div></div>';
  renderTO('awayTO',4,0);renderTO('homeTO',4,0);
  setTimeout(()=>drawScoringChart([],[],0),100);
}

function renderTO(id,total,used){const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let i=0;i<total;i++){const d=document.createElement('div');d.className='timeout-dot'+(i<used?' used':'');el.appendChild(d);}}

// ---- SCORING CHART (dual lines like ESPN) ----
function drawScoringChart(awayPts, homePts, halftimeIdx){
  const canvas=document.getElementById('scoringChart');if(!canvas)return;
  const W=canvas.offsetWidth||900,H=120;
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);

  if(!awayPts.length&&!homePts.length){
    ctx.fillStyle='#64748b';ctx.font='12px system-ui';ctx.textAlign='center';
    ctx.fillText('Scoring chart loads as game progresses',W/2,H/2+4);return;
  }

  const maxScore=Math.max(...awayPts,...homePts,10);
  const pad={l:8,r:8,t:10,b:8};
  const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  const n=Math.max(awayPts.length,homePts.length,1);
  const xOf=i=>pad.l+(i/(n-1||1))*cW;
  const yOf=v=>pad.t+cH-(v/maxScore)*cH;

  // Halftime divider
  if(halftimeIdx>0&&halftimeIdx<n){
    const hx=xOf(halftimeIdx);
    ctx.strokeStyle='rgba(100,116,139,0.4)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(hx,pad.t);ctx.lineTo(hx,H-pad.b);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(100,116,139,0.7)';ctx.font='9px system-ui';ctx.textAlign='center';
    ctx.fillText('HT',hx,pad.t+8);
  }

  // Draw score lines
  function drawLine(pts,color){
    if(!pts.length)return;
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';
    pts.forEach((v,i)=>i===0?ctx.moveTo(xOf(i),yOf(v)):ctx.lineTo(xOf(i),yOf(v)));
    ctx.stroke();
    // End score dot
    const last=pts[pts.length-1];
    ctx.beginPath();ctx.fillStyle=color;ctx.arc(xOf(pts.length-1),yOf(last),3,0,Math.PI*2);ctx.fill();
    // End score label
    ctx.fillStyle=color;ctx.font='bold 11px system-ui';ctx.textAlign='left';
    ctx.fillText(last,xOf(pts.length-1)+5,yOf(last)+4);
  }

  drawLine(awayPts,'#3b82f6');
  drawLine(homePts,'#f97316');
}

// ---- EFFICIENCY CHARTS ----
function renderEfficiency(awayStats,homeStats,aName,hName){
  const el=document.getElementById('effGrid');if(!el)return;
  function calcEff(stats){
    const getStat=(name)=>{const s=stats.find(x=>x.name===name);return parseFloat(s?.displayValue||s?.value||0)||0;};
    const fgm=parseInt((getStat('fieldGoalsMade-fieldGoalsAttempted').toString().split('-')[0]))||0;
    const fga=parseInt((getStat('fieldGoalsMade-fieldGoalsAttempted').toString().split('-')[1]))||0;
    const ftm=parseInt((getStat('freeThrowsMade-freeThrowsAttempted').toString().split('-')[0]))||0;
    const fta=parseInt((getStat('freeThrowsMade-freeThrowsAttempted').toString().split('-')[1]))||0;
    const tpm=parseInt((getStat('threePointFieldGoalsMade-threePointFieldGoalsAttempted').toString().split('-')[0]))||0;
    const tpa=parseInt((getStat('threePointFieldGoalsMade-threePointFieldGoalsAttempted').toString().split('-')[1]))||0;
    const oreb=getStat('offensiveRebounds')||getStat('OREB')||0;
    const tov=getStat('turnovers')||getStat('TO')||0;
    const pts=getStat('points')||getStat('PTS')||0;
    const poss=Math.max(fga-oreb+tov+0.44*fta,1);
    const offEff=(pts/poss*100);
    // True shooting %
    const tsAttempts=fga+0.44*fta;
    const ts=tsAttempts>0?(pts/(2*tsAttempts)*100):0;
    // TOV rate
    const tovRate=tov/poss*100;
    // OREB rate (need total reb - just use raw)
    const fg3Pct=tpa>0?(tpm/tpa*100):0;
    return{offEff,ts,tovRate,fg3Pct,poss:Math.round(poss),pts};
  }
  const ae=awayStats.length?calcEff(awayStats):{offEff:0,ts:0,tovRate:0,fg3Pct:0};
  const he=homeStats.length?calcEff(homeStats):{offEff:0,ts:0,tovRate:0,fg3Pct:0};

  function barPct(val,max){return Math.min((val/max)*100,100).toFixed(1);}
  function effColor(val,good,bad){
    if(val>=good)return'var(--green)';
    if(val<=bad)return'var(--red)';
    return'var(--yellow)';
  }
  function teamPanel(e,name,isHome){
    const offClr=effColor(e.offEff,110,90);
    const tsClr=effColor(e.ts,55,45);
    const tovClr=e.tovRate<=15?'var(--green)':e.tovRate>=22?'var(--red)':'var(--yellow)';
    const fg3Clr=effColor(e.fg3Pct,36,28);
    return `<div class="eff-team">
      <div class="eff-team-name" style="color:${isHome?'var(--accent)':'var(--accent2)'}">${name}</div>
      <div class="eff-row">
        <div class="eff-label"><span>OFF EFF</span><span class="eff-val" style="color:${offClr}">${e.offEff.toFixed(1)}</span></div>
        <div class="eff-bar-bg"><div class="eff-bar-fill eff-bar-off" style="width:${barPct(e.offEff,130)}%;background:${offClr}"></div></div>
      </div>
      <div class="eff-row">
        <div class="eff-label"><span>TRUE SHOOT%</span><span class="eff-val" style="color:${tsClr}">${e.ts.toFixed(1)}%</span></div>
        <div class="eff-bar-bg"><div class="eff-bar-fill eff-bar-ts" style="width:${barPct(e.ts,70)}%;background:${tsClr}"></div></div>
      </div>
      <div class="eff-row">
        <div class="eff-label"><span>TOV RATE</span><span class="eff-val" style="color:${tovClr}">${e.tovRate.toFixed(1)}%</span></div>
        <div class="eff-bar-bg"><div class="eff-bar-fill eff-bar-tov" style="width:${barPct(e.tovRate,30)}%;background:${tovClr}"></div></div>
      </div>
      <div class="eff-row">
        <div class="eff-label"><span>3PT%</span><span class="eff-val" style="color:${fg3Clr}">${e.fg3Pct.toFixed(1)}%</span></div>
        <div class="eff-bar-bg"><div class="eff-bar-fill" style="width:${barPct(e.fg3Pct,50)}%;background:${fg3Clr}"></div></div>
      </div>
    </div>`;
  }
  el.innerHTML=teamPanel(ae,aName,false)+teamPanel(he,hName,true);
}

async function loadGameDetails(gid){
  try{
    const[box,summ]=await Promise.allSettled([
      api('/mbb/box-score/'+gid),
      api('/mbb/summary/'+gid)
    ]);
    if(box.status==='fulfilled')renderBox(box.value);
    if(summ.status==='fulfilled'){
      renderOdds(summ.value);
      renderH2H(summ.value);
      renderScoringChart(summ.value);
      renderEffFromSummary(summ.value);
    }
    document.getElementById('lastUpdate').textContent='Updated '+new Date().toLocaleTimeString();
  }catch(e){showErr('Game error: '+e.message);}
}

function renderScoringChart(data){
  const plays=data?.plays||[];
  if(!plays.length){drawScoringChart([],[],0);return;}
  // Filter to scoring plays or at minimum score-change plays
  const scored=plays.filter(p=>p.awayScore!=null&&p.homeScore!=null);
  const awayPts=scored.map(p=>parseInt(p.awayScore)||0);
  const homePts=scored.map(p=>parseInt(p.homeScore)||0);
  // Find halftime index
  const htIdx=scored.findIndex(p=>p.period?.number===2);
  drawScoringChart(awayPts,homePts,htIdx>0?htIdx:0);
}

function renderEffFromSummary(data){
  if(!selEvt)return;
  const comp=selEvt.competitions?.[0]||selEvt,teams=comp.competitors||[];
  const away=teams.find(t=>t.homeAway==='away')||teams[0]||{};
  const home=teams.find(t=>t.homeAway==='home')||teams[1]||{};
  const aName=away.team?.location||'Away';
  const hName=home.team?.location||'Home';
  // Use boxScore from summary
  const boxTeams=data?.boxScore?.teams||[];
  const aTeam=boxTeams.find(t=>t.team?.homeAway==='away')||boxTeams[0]||{};
  const hTeam=boxTeams.find(t=>t.team?.homeAway==='home')||boxTeams[1]||{};
  renderEfficiency(aTeam.statistics||[],hTeam.statistics||[],aName,hName);
}

function renderBox(data){
  const tl=data?.players||data?.teams||[];const teams=Array.isArray(tl)?tl:Object.values(tl);
  ['awayPlayers','homePlayers'].forEach((id,idx)=>{
    const el=document.getElementById(id);if(!el)return;
    const td=teams[idx];if(!td){el.innerHTML='<div style="color:var(--muted);padding:8px">No data</div>';return;}
    const roster=td?.statistics?.[0]?.athletes||td?.athletes||[];
    if(!roster.length){el.innerHTML='<div style="color:var(--muted);padding:8px">No player data</div>';return;}
    const sorted=roster.filter(a=>a?.stats?.length>0).map(a=>{
      const s=a.stats||[];
      return{name:a.athlete?.shortName||'—',pos:a.athlete?.position?.abbreviation||'',min:s[0]||'0',fg:s[2]||'0-0',tp:s[3]||'0-0',reb:s[5]||'0',ast:s[6]||'0',fouls:parseInt(s[12]||0),pts:parseInt(s[1]||0)};
    }).sort((a,b)=>b.pts-a.pts).slice(0,8);
    let h='<table class="players-table"><thead><tr><th>Player</th><th>Min</th><th>PTS</th><th>REB</th><th>AST</th><th>FG</th><th>3PT</th><th>Fouls</th></tr></thead><tbody>';
    sorted.forEach(p=>{const fc=p.fouls>=4?'foul-danger':p.fouls===3?'foul-warning':'foul-ok';
      h+='<tr><td><div class="player-name">'+p.name+'</div><div class="player-pos">'+p.pos+'</div></td><td>'+p.min+'</td><td style="font-weight:700">'+p.pts+'</td><td>'+p.reb+'</td><td>'+p.ast+'</td><td>'+p.fg+'</td><td>'+p.tp+'</td><td><span class="foul-badge '+fc+'">'+p.fouls+'</span></td></tr>';});
    el.innerHTML=h+'</tbody></table>';
  });
}
function renderOdds(data){const odds=data?.pickcenter||data?.odds||[];const s=document.getElementById('spreadVal'),o=document.getElementById('ouVal');if(!s||!o)return;s.textContent=odds[0]?.details||'—';o.textContent=odds[0]?.overUnder?odds[0].overUnder.toFixed(1):'—';}
function renderH2H(data){const el=document.getElementById('h2hSection');if(!el)return;const h=data?.headToHeadMatchups||data?.h2h||[];if(!h.length){el.innerHTML='<div style="color:var(--muted);padding:8px">No H2H data</div>';return;}el.innerHTML=h.slice(0,5).map(g=>'<div class="h2h-row"><span>'+(g.shortName||'—')+'</span><span style="color:var(--muted)">'+(g.score||'—')+'</span><span style="font-size:0.65rem;color:var(--muted)">'+(g.date||'')+'</span></div>').join('');}
</script>
